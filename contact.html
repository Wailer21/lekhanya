<section>
    <h2>Contact Us or Volunteer</h2>
    
    <form style="max-width: 700px; margin: 0 auto; display: grid; gap: 1.2rem;">
        <input type="text" placeholder="Your Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="text" placeholder="Subject" required>
        <textarea rows="6" placeholder="Your Message or Why you want to volunteer..." required></textarea>
        <button type="submit" class="btn">Send Message</button>
    </form>

    <h2 style="margin-top: 4rem;">Become a Volunteer</h2>
    <p style="text-align:center; max-width:700px; margin:0 auto;">
        Join our global volunteer network. Help with tree planting, education drives, water projects, and more.
    </p>
